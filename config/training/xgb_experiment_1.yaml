# config/training/xgb_experiment_1.yaml
experiment_name: xgboost_v1
model_type: xgboost

data:
  symbol: BTC/USDT
  timeframes:
    - 1h
  forward_window: 24
  threshold_pct: 0.005

model:
  n_estimators: 500   # +300: compensa el learning_rate més baix
  max_depth: 5        # -1: menys profund, millor generalització en sèries sorolloses
  learning_rate: 0.02 # -0.03: XGBoost amb lr baix + molts arbres és la recepta golden
  scale_pos_weight: 2.0

output:
  model_path: models/xgboost_v1.pkl