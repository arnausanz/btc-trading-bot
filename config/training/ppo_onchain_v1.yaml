# config/training/ppo_onchain_v1.yaml
# PPO experiment with external on-chain + sentiment features.
#
# obs_shape = len(features.select) × environment.lookback = 14 × 96 = 1344
#
# New columns added vs baseline:
#   fear_greed_value  — daily sentiment index (0-100)
#   fear_greed_class  — ordinal 0-4 (Extreme Fear → Extreme Greed)
#   funding_rate      — 8h perpetual futures funding rate
#   oi_btc_1h         — hourly open interest in BTC
#   hash_rate         — daily Bitcoin network hash rate (TH/s)
experiment_name: ppo_onchain_v1
model_type: ppo

data:
  symbol: BTC/USDT
  timeframe: 1h
  train_pct: 0.8

  # ── Feature config ──────────────────────────────────────────────────────────
  features:
    external:
      fear_greed: true                  # adds: fear_greed_value, fear_greed_class
      funding_rate: true                # adds: funding_rate
      funding_rate_symbol: BTC/USDT:USDT
      open_interest:                    # adds: oi_btc_1h, oi_usdt_1h
        - symbol: BTC/USDT:USDT
          timeframe: 1h
      blockchain:                       # adds: hash_rate
        - hash-rate

    # MUST match features list in config/bots/rl_bot_ppo_onchain.yaml
    # obs_shape = 14 × 96 = 1344
    select:
      - close
      - rsi_14
      - macd
      - macd_signal
      - macd_hist
      - atr_14
      - bb_upper_20
      - bb_lower_20
      - bb_middle_20
      - fear_greed_value
      - fear_greed_class
      - funding_rate
      - oi_btc_1h
      - hash_rate

environment:
  lookback: 96           # MUST match config/bots/rl_bot_ppo_onchain.yaml lookback
  initial_capital: 10000.0
  fee_rate: 0.001
  reward_scaling: 100.0
  reward_type: sharpe

model:
  total_timesteps: 500000
  learning_rate: 0.00012260057359187533  # from optimized PPO
  batch_size: 128
  n_steps: 2048
  n_epochs: 10
  gamma: 0.9674809130079859
  policy: MlpPolicy

output:
  model_path: models/ppo_onchain_v1
