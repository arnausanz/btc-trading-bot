# config/training/catboost_experiment_1.yaml
experiment_name: catboost_v1
model_type: catboost

data:
  symbol: BTC/USDT
  timeframes:
    - 1h
  forward_window: 24
  threshold_pct: 0.005

model:
  iterations: 700    # +400: CatBoost convergeix bé, l'ordered boosting protegeix de l'overfitting
  depth: 6           # mantenim: arbres simètrics a profunditat 6 és el sweet spot per a dades tabulars
  learning_rate: 0.03 # mantenim: CatBoost és robust a lr entre 0.01-0.1
  scale_pos_weight: 2.0

output:
  model_path: models/catboost_v1.pkl