# config/training/ppo_experiment_1.yaml
experiment_name: ppo_btc_v1
model_type: ppo

data:
  symbol: BTC/USDT
  timeframe: 1h
  train_pct: 0.8

  # ── Feature config ──────────────────────────────────────────────────────────
  # features.select MUST match config/bots/rl_bot_ppo.yaml features list
  # obs_shape = len(select) × environment.lookback = 9 × 50 = 450
  features:
    external: {}   # no external features in this baseline experiment
    select:
      - close
      - rsi_14
      - macd
      - macd_signal
      - macd_hist
      - atr_14
      - bb_upper_20
      - bb_lower_20
      - bb_middle_20

environment:
  lookback: 50
  initial_capital: 10000.0
  fee_rate: 0.001
  reward_scaling: 100.0
  reward_type: sharpe

model:
  total_timesteps: 500000  # 50k → 500k: mínim recomanat per a RL financer (SAC és més eficient)
  learning_rate: 0.0003
  batch_size: 64
  n_steps: 2048
  n_epochs: 10
  gamma: 0.99
  policy: MlpPolicy

output:
  model_path: models/ppo_btc_v1