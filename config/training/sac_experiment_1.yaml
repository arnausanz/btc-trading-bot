# config/training/sac_experiment_1.yaml
experiment_name: sac_btc_v1
model_type: sac

data:
  symbol: BTC/USDT
  timeframe: 1h
  train_pct: 0.8

  # ── Feature config ──────────────────────────────────────────────────────────
  # features.select MUST match config/bots/rl_bot_sac.yaml features list
  # obs_shape = len(select) × environment.lookback = 9 × 50 = 450
  features:
    external: {}   # no external features in this baseline experiment
    select:
      - close
      - rsi_14
      - macd
      - macd_signal
      - macd_hist
      - atr_14
      - bb_upper_20
      - bb_lower_20
      - bb_middle_20

environment:
  lookback: 50
  initial_capital: 10000.0
  fee_rate: 0.001
  reward_scaling: 100.0
  reward_type: simple     # simple | sharpe | sortino | penalize_inaction

model:
  total_timesteps: 500000  # 50k → 500k: mínim recomanat per a RL financer
  learning_rate: 0.0003
  batch_size: 256
  buffer_size: 100000
  learning_starts: 1000
  gamma: 0.99
  tau: 0.005
  train_freq: 1
  gradient_steps: 1
  policy: MlpPolicy
  net_arch: [256, 256]

output:
  model_path: models/sac_btc_v1