# config/training/patchtst_experiment_1.yaml
experiment_name: patchtst_v1
model_type: patchtst

data:
  symbol: BTC/USDT
  timeframes:
    - 1h
  forward_window: 24
  threshold_pct: 0.005

model:
  seq_len: 168       # 7 dies (1 setmana) — captura patrons setmanals de BTC; (168-24)//12+1 = 13 patches
  patch_len: 24      # 1 dia per patch — unitat semàntica natural per a BTC horari
  stride: 12         # 50% solapament — equilibri entre context ric i redundància
  d_model: 128       # x2 de 64: representació interna enriquida, alineat amb PatchTST original (Nie 2023)
  n_heads: 8         # x2: 128/8 = 16 dims per cap, recomanat en la literatura
  n_layers: 3        # +1: encoder més profund per capturar dependències complexes
  dropout: 0.1       # mantenim: Transformers amb AdamW no necessiten molt dropout
  epochs: 50         # +30: early stopping gestiona el tall real
  batch_size: 32     # -32: batches petits milloren generalització en Transformers (gradient noise)
  learning_rate: 0.0001  # x0.1: AdamW + Transformers requereixen lr molt baix vs RNNs
  patience: 10       # x2: Transformers triguen més a convergir

output:
  model_path: models/patchtst_v1.pt