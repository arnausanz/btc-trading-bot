# comparable: false — excluded from walk-forward comparison and demo.
# Reason: baseline PPO (1H) was trained without on-chain features and has not
# been validated out-of-sample. To make it comparable, either train it without
# external features and add comparable: true, or use ppo_professional.yaml instead.
comparable: false

best_params:
  batch_size: 64
  gamma: 0.9811841101519252
  learning_rate: 0.00020623196560647133
  lookback: 50
  n_steps: 1024
  reward_type: sharpe
bot:
  bot_id: rl_ppo_v1
  trade_size: 0.5
category: RL
features:
  external: {}
  lookback: 96
  select:
  - close
  - rsi_14
  - macd
  - macd_signal
  - macd_hist
  - atr_14
  - bb_upper_20
  - bb_lower_20
  - bb_middle_20
model_type: ppo
optimization:
  direction: maximize
  metric: val_return_pct
  n_trials: 15
  probe_timesteps: 20000
  search_space:
    batch_size:
      choices:
      - 32
      - 64
      - 128
      type: categorical
    gamma:
      high: 0.999
      low: 0.95
      type: float
    learning_rate:
      high: 0.001
      log: true
      low: 0.0001
      type: float
    lookback:
      choices:
      - 30
      - 50
      - 96
      type: categorical
    n_steps:
      choices:
      - 512
      - 1024
      - 2048
      type: categorical
    reward_type:
      choices:
      - simple
      - sharpe
      - sortino
      type: categorical
symbol: BTC/USDT
timeframe: 1h
training:
  environment:
    fee_rate: 0.001
    initial_capital: 10000.0
    reward_scaling: 100.0
    reward_type: sharpe
  experiment_name: ppo_optimized
  model:
    batch_size: 128
    gamma: 0.9674809130079859
    learning_rate: 0.00012260057359187533
    n_epochs: 10
    n_steps: 2048
    policy: MlpPolicy
    total_timesteps: 1500000
  model_path: models/ppo_btc_v1
  train_pct: 0.8
