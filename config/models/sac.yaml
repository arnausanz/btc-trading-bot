# config/models/sac.yaml
# ─────────────────────────────────────────────────────────────────────────────
# SAC (Soft Actor-Critic) — agent RL amb accions contínues
# Off-policy + entropy maximization = exploració robusta en mercats sorollosos.
# Accions contínues [-1, 1]: sizing natural de posicions.
# Hyperparàmetres optimitzats amb Optuna (15 trials, 20k steps cada un).
#
# REGLA CRÍTICA d'obs_shape:
#   obs_shape = len(features.select) × features.lookback = 9 × 96 = 864
#   features.select AQUÍ ha de ser IDÈNTIC al que es va usar per entrenar.
# ─────────────────────────────────────────────────────────────────────────────
category: RL
model_type: sac
symbol: BTC/USDT
timeframe: 1h

# ── Features ────────────────────────────────────────────────────────────────
# CRÍTIC: select + lookback determinen obs_shape. Han de coincidir entre
# entrenament i desplegament. NO canviar sense re-entrenar el model.
features:
  lookback: 96              # MUST match training.environment.lookback
  select:
    - close
    - rsi_14
    - macd
    - macd_signal
    - macd_hist
    - atr_14
    - bb_upper_20
    - bb_lower_20
    - bb_middle_20
  external: {}              # sense dades externes en aquest baseline

# ── Entrenament ─────────────────────────────────────────────────────────────
training:
  experiment_name: sac_optimized
  train_pct: 0.8
  model_path: models/sac_btc_v1
  environment:
    initial_capital: 10000.0
    fee_rate: 0.001
    reward_scaling: 100.0
    reward_type: sortino    # simple | sharpe | sortino | penalize_inaction
  model:
    total_timesteps: 500000
    learning_rate: 0.0006798962421591129
    batch_size: 128
    buffer_size: 100000
    learning_starts: 1000
    gamma: 0.9649078699050173
    tau: 0.010970372201012518
    train_freq: 1
    gradient_steps: 1
    policy: MlpPolicy
    net_arch:
      - 256
      - 256

# ── Optimització (Optuna) ────────────────────────────────────────────────────
# Executar: python scripts/optimize_models.py --agents sac
# Cada trial entrena probe_timesteps (ràpid) i avalua val_return_pct.
# Resultat guardat a: config/models/sac_optimized.yaml
optimization:
  n_trials: 15
  probe_timesteps: 20000    # Timesteps per trial (<<total_timesteps per velocitat)
  metric: val_return_pct
  direction: maximize
  search_space:
    learning_rate:
      type: float
      low: 0.0001
      high: 0.001
      log: true
    batch_size:
      type: categorical
      choices: [128, 256, 512]
    gamma:
      type: float
      low: 0.95
      high: 0.999
    tau:
      type: float
      low: 0.001
      high: 0.02
    reward_type:
      type: categorical
      choices: [simple, sharpe, sortino]
    lookback:
      type: categorical
      choices: [30, 50, 96]

# ── Desplegament (bot) ──────────────────────────────────────────────────────
bot:
  bot_id: rl_sac_v1
  trade_size: 0.5
