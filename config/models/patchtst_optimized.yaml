bot:
  bot_id: ml_patchtst_v1
  lookback: 200
  min_confidence: 0.4
  prediction_threshold: 0.35
  trade_size: 0.5
category: ML
features:
  external: {}
  select: null
forward_window: 24
model_type: patchtst
optimization:
  direction: maximize
  metric: accuracy_mean
  n_trials: 15
  search_space:
    batch_size:
      choices:
      - 32
      - 64
      - 128
      type: categorical
    d_model:
      choices:
      - 64
      - 128
      type: categorical
    dropout:
      high: 0.3
      low: 0.05
      type: float
    learning_rate:
      high: 0.005
      log: true
      low: 0.0001
      type: float
    n_layers:
      high: 3
      low: 1
      type: int
    seq_len:
      choices:
      - 72
      - 96
      - 168
      type: categorical
symbol: BTC/USDT
threshold_pct: 0.005
timeframes:
- 1h
training:
  experiment_name: patchtst_optimized
  model:
    batch_size: 32
    d_model: 128
    dropout: 0.11232305728721874
    epochs: 50
    learning_rate: 0.0004979987773685088
    n_heads: 8
    n_layers: 3
    patch_len: 24
    patience: 10
    seq_len: 168
    stride: 12
  model_path: models/patchtst_v1_optimized.pt
