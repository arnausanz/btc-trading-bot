# config/models/ppo_onchain.yaml
# ─────────────────────────────────────────────────────────────────────────────
# PPO amb features on-chain + sentiment — versió avançada
# Afegeix Fear & Greed, Funding Rate, Open Interest i Hash-Rate de blockchain
# a les features tècniques bàsiques.
#
# REGLA CRÍTICA d'obs_shape:
#   obs_shape = len(features.select) × features.lookback = 14 × 96 = 1344
#
# PRE-REQUISIT: dades externes han d'estar a la BD:
#   python scripts/download_fear_greed.py
#   python scripts/download_blockchain.py
#   python scripts/update_futures.py
# ─────────────────────────────────────────────────────────────────────────────
category: RL
model_type: ppo
symbol: BTC/USDT
timeframe: 1h

# ── Features ────────────────────────────────────────────────────────────────
features:
  lookback: 96
  select:
    - close
    - rsi_14
    - macd
    - macd_signal
    - macd_hist
    - atr_14
    - bb_upper_20
    - bb_lower_20
    - bb_middle_20
    - fear_greed_value
    - fear_greed_class
    - funding_rate
    - oi_btc_1h
    - hash_rate
  external:
    fear_greed: true
    funding_rate: true
    funding_rate_symbol: BTC/USDT:USDT
    open_interest:
      - symbol: BTC/USDT:USDT
        timeframe: 1h
    blockchain:
      - hash-rate

# ── Entrenament ─────────────────────────────────────────────────────────────
training:
  experiment_name: ppo_onchain_v1
  train_pct: 0.8
  model_path: models/ppo_onchain_v1
  environment:
    initial_capital: 10000.0
    fee_rate: 0.001
    reward_scaling: 100.0
    reward_type: sharpe
  model:
    total_timesteps: 500000
    learning_rate: 0.0003
    batch_size: 128
    n_steps: 2048
    n_epochs: 10
    gamma: 0.99
    policy: MlpPolicy

# ── Optimització (Optuna) ────────────────────────────────────────────────────
# Executar: python scripts/optimize_models.py --agents ppo_onchain
# Resultat guardat a: config/models/ppo_onchain_optimized.yaml
optimization:
  n_trials: 15
  probe_timesteps: 20000
  metric: val_return_pct
  direction: maximize
  search_space:
    learning_rate:
      type: float
      low: 0.0001
      high: 0.001
      log: true
    n_steps:
      type: categorical
      choices: [512, 1024, 2048]
    batch_size:
      type: categorical
      choices: [32, 64, 128]
    gamma:
      type: float
      low: 0.95
      high: 0.999
    reward_type:
      type: categorical
      choices: [simple, sharpe, sortino]

# ── Desplegament (bot) ──────────────────────────────────────────────────────
bot:
  bot_id: rl_ppo_onchain_v1
  trade_size: 0.5
