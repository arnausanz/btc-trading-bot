best_params:
  batch_size: 64
  gamma: 0.9649260746894951
  learning_rate: 0.00012521954287060397
  n_steps: 512
  reward_type: sortino
bot:
  bot_id: rl_ppo_onchain_v1
  trade_size: 0.5
category: RL
comparable: false
features:
  external:
    blockchain:
    - hash-rate
    fear_greed: true
    funding_rate: true
    funding_rate_symbol: BTC/USDT:USDT
    open_interest:
    - symbol: BTC/USDT:USDT
      timeframe: 1h
  lookback: 96
  select:
  - close
  - rsi_14
  - macd
  - macd_signal
  - macd_hist
  - atr_14
  - bb_upper_20
  - bb_lower_20
  - bb_middle_20
  - fear_greed_value
  - fear_greed_class
  - funding_rate
  - oi_btc_1h
  - hash_rate
model_type: ppo
optimization:
  direction: maximize
  metric: val_return_pct
  n_trials: 15
  probe_timesteps: 20000
  search_space:
    batch_size:
      choices:
      - 32
      - 64
      - 128
      type: categorical
    gamma:
      high: 0.999
      low: 0.95
      type: float
    learning_rate:
      high: 0.001
      log: true
      low: 0.0001
      type: float
    n_steps:
      choices:
      - 512
      - 1024
      - 2048
      type: categorical
    reward_type:
      choices:
      - simple
      - sharpe
      - sortino
      type: categorical
symbol: BTC/USDT
timeframe: 1h
training:
  environment:
    fee_rate: 0.001
    initial_capital: 10000.0
    reward_scaling: 100.0
    reward_type: sharpe
  experiment_name: ppo_onchain_v1
  model:
    batch_size: 128
    gamma: 0.99
    learning_rate: 0.0003
    n_epochs: 10
    n_steps: 2048
    policy: MlpPolicy
    total_timesteps: 1500000
  model_path: models/ppo_onchain_v1
  train_pct: 0.8
