# config/models/grid.yaml
# ─────────────────────────────────────────────────────────────────────────────
# GridBot — grid trading amb Bollinger Bands + filtre RSI
# Compra prop de la banda inferior i ven prop de la superior.
# Funciona millor en mercats laterals (rang definit).
# ─────────────────────────────────────────────────────────────────────────────
category: classic
model_type: grid
bot_id: grid_v1
symbol: BTC/USDT
timeframe: 1h
lookback: 50
features:
  - close
  - bb_upper_20
  - bb_lower_20
  - bb_middle_20
  - rsi_14

# ── Paràmetres d'estratègia ─────────────────────────────────────────────────
grid_spread: 0.02        # 2% entre nivells del grid
num_levels: 5            # Nivells per sobre i per sota del preu
level_size: 0.05         # 5% del capital per nivell
rsi_filter_high: 75      # No compra si RSI > aquest valor
rsi_filter_low: 25       # No ven si RSI < aquest valor

# ── Optimització (Optuna) ────────────────────────────────────────────────────
# Executar: python scripts/optimize_bots.py --bots grid
# Resultat guardat a: config/models/grid_optimized.yaml
optimization:
  n_trials: 100
  metric: sharpe_ratio
  direction: maximize
  search_space:
    level_size:
      type: float
      low: 0.02
      high: 0.3
    rsi_filter_high:
      type: int
      low: 60
      high: 85
    rsi_filter_low:
      type: int
      low: 15
      high: 40
