bot:
  bot_id: ml_gru_v1
  lookback: 200
  min_confidence: 0.4
  prediction_threshold: 0.35
  trade_size: 0.5
category: ML
features:
  external: {}
  select: null
forward_window: 24
model_type: gru
optimization:
  direction: maximize
  metric: accuracy_mean
  n_trials: 15
  search_space:
    batch_size:
      choices:
      - 32
      - 64
      - 128
      type: categorical
    dropout:
      high: 0.5
      low: 0.1
      type: float
    hidden_size:
      choices:
      - 64
      - 128
      type: categorical
    learning_rate:
      high: 0.01
      log: true
      low: 0.0001
      type: float
    seq_len:
      choices:
      - 48
      - 72
      - 96
      type: categorical
symbol: BTC/USDT
threshold_pct: 0.005
timeframes:
- 1h
training:
  experiment_name: gru_optimized
  model:
    batch_size: 64
    dropout: 0.3916028672163949
    epochs: 50
    hidden_size: 64
    learning_rate: 0.0034877126245459306
    num_layers: 1
    patience: 10
    seq_len: 48
  model_path: models/gru_v1_optimized.pt
