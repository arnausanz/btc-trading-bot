# config/models/td3_professional.yaml
# ─────────────────────────────────────────────────────────────────────────────
# TD3 Professional — swing trading 12H, accions contínues, sentiment integrat
#
# Algoritme: TD3 (Twin Delayed DDPG)  — Fujimoto et al. 2018
#   Avantatge sobre SAC en mercats financers sorollosos:
#   - Twin critics: evita sobreestimació de Q-values (típic en price spikes BTC)
#   - Delayed policy updates: redueix variança en sèries temporals no estacionàries
#   - Target policy smoothing: suavitza el paisatge de valor davant reward spikes
#
# Diferències clau vs sac_professional.yaml:
#   - Algoritme: TD3 (no SAC → sense entropia automàtica, sense ent_coef)
#   - buffer_size: 200.000 (SAC usa 100.000) — TD3 es beneficia de replay més gran
#   - policy_delay: 2 (cada 2 critic updates → 1 actor update)
#   - target_policy_noise: 0.2 (suavitzat del target policy)
#   - action_noise_sigma: 0.1 (soroll d'exploració durant entrenament)
#
# PRE-REQUISIT dades (igual que ppo/sac_professional.yaml):
#   python scripts/download_data.py        (assegura timeframe 12h)
#   python scripts/download_fear_greed.py
#   python scripts/update_futures.py
#
# obs_shape = (18 features × 90 lookback) + 4 position state = 1.624
# ─────────────────────────────────────────────────────────────────────────────
category: RL
model_type: td3_professional
symbol: BTC/USDT
timeframe: 12h

# ── Features ────────────────────────────────────────────────────────────────
# Idèntiques a sac_professional — critical: obs_shape must match at inference
features:
  lookback: 90
  select:
    # Price & momentum
    - close
    - rsi_14
    - macd
    - macd_signal
    - macd_hist
    # Volatility
    - atr_14
    - atr_5
    - vol_ratio          # atr_5 / atr_14 — regime detector
    # Trend & structure
    - bb_upper_20
    - bb_lower_20
    - bb_middle_20
    - ema_20
    - ema_50
    - adx_14             # trend strength (0–100)
    # Volume
    - volume
    - volume_norm_20
    # Sentiment (C3 extension — TD3 uses Fear & Greed + funding rate)
    - fear_greed_value   # 0 (Extreme Fear) → 100 (Extreme Greed)
    - funding_rate       # perpetual funding: positive = longs pay shorts
  external:
    fear_greed: true
    funding_rate: true
    funding_rate_symbol: BTC/USDT:USDT

# ── Entrenament ─────────────────────────────────────────────────────────────
training:
  experiment_name: td3_professional_v1
  train_pct: 0.8
  model_path: models/td3_professional_v1
  environment:
    initial_capital: 10000.0
    fee_rate: 0.001
    reward_scaling: 100.0
    reward_type: professional       # inherits ATR-scaled + drawdown + overtrading
    stop_atr_multiplier: 2.0
  model:
    total_timesteps: 500000
    learning_rate: 0.001            # TD3 converges faster with higher lr than SAC
    batch_size: 256
    buffer_size: 200000             # larger replay buffer benefits TD3
    learning_starts: 1000
    gamma: 0.99
    tau: 0.005
    train_freq: 1
    gradient_steps: 1
    policy_delay: 2                 # TD3: actor updated every 2 critic steps
    target_policy_noise: 0.2        # Gaussian noise on target actions
    target_noise_clip: 0.5          # clip target noise to ±0.5
    action_noise_sigma: 0.1         # exploration noise sigma (NormalActionNoise)
    policy: MlpPolicy
    net_arch: [256, 256]

# ── Optimització (Optuna) ────────────────────────────────────────────────────
optimization:
  n_trials: 15
  probe_timesteps: 25000
  metric: val_return_pct
  direction: maximize
  search_space:
    learning_rate:
      type: float
      low: 0.0003
      high: 0.003
      log: true
    batch_size:
      type: categorical
      choices: [128, 256, 512]
    gamma:
      type: float
      low: 0.95
      high: 0.999
    stop_atr_multiplier:
      type: float
      low: 1.5
      high: 3.0
    policy_delay:
      type: categorical
      choices: [1, 2, 3]
    target_policy_noise:
      type: float
      low: 0.1
      high: 0.4
    lookback:
      type: categorical
      choices: [60, 90]

# ── Desplegament (bot) ──────────────────────────────────────────────────────
bot:
  bot_id: rl_td3_professional_v1
  trade_size: 1.0
