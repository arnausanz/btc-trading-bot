# config/models/lightgbm.yaml
# ─────────────────────────────────────────────────────────────────────────────
# LightGBM — gradient boosting basat en histogrames (molt ràpid)
# num_leaves controla la complexitat; 2^max_depth és el límit teòric.
# ─────────────────────────────────────────────────────────────────────────────
category: ML
model_type: lightgbm
module: bots.ml.lightgbm_model
class_name: LightGBMModel
symbol: BTC/USDT
timeframes:
  - 1h
forward_window: 24       # Horitzó de predicció (hores)
threshold_pct: 0.005     # Mínim 0.5% de moviment per considerar senyal positiu

# ── Features ────────────────────────────────────────────────────────────────
features:
  select: null            # null = totes les columnes de FeatureBuilder
  external: {}            # sense dades externes en aquest baseline

# ── Entrenament ─────────────────────────────────────────────────────────────
training:
  experiment_name: lightgbm_v1
  model_path: models/lightgbm_v1.pkl
  model:
    n_estimators: 600     # +300: LightGBM és ràpid, podem permetre'ns-ho
    max_depth: 7          # +1: permet num_leaves=50 sense violar 2^max_depth
    learning_rate: 0.02   # -0.01: lleugerament més conservador
    num_leaves: 50        # +19: més expressivitat que default 31
    scale_pos_weight: 2.0

# ── Optimització (Optuna) ────────────────────────────────────────────────────
# Executar: python scripts/optimize_models.py --models lgbm
# Resultat guardat a: config/models/lightgbm_optimized.yaml
optimization:
  n_trials: 30
  metric: accuracy_mean
  direction: maximize
  search_space:
    n_estimators:
      type: int
      low: 100
      high: 500
    max_depth:
      type: int
      low: 3
      high: 10
    learning_rate:
      type: float
      low: 0.01
      high: 0.3
      log: true
    num_leaves:
      type: int
      low: 15
      high: 63
    scale_pos_weight:
      type: float
      low: 1.0
      high: 5.0

# ── Desplegament (bot) ──────────────────────────────────────────────────────
bot:
  bot_id: ml_lgbm_v1
  lookback: 200
  min_confidence: 0.4
  trade_size: 0.5
  prediction_threshold: 0.35
