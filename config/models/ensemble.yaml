# config/models/ensemble.yaml
# ─────────────────────────────────────────────────────────────────────────────
# EnsembleBot — meta-bot que combina senyals de múltiples sub-bots
#
# Política v1 (demo): majority_vote
#   BUY  si > 50% sub-bots diuen BUY
#   SELL si > 50% sub-bots diuen SELL
#   HOLD en qualsevol altre cas
#
# Per afegir/treure sub-bots: edita la llista sub_bots i reinicia el DemoRunner.
# ─────────────────────────────────────────────────────────────────────────────
category: classic
comparable: false
model_type: ensemble
module: bots.classical.ensemble_bot
class_name: EnsembleBot

bot_id: ensemble_v1
policy: majority_vote   # majority_vote | weighted (futur) | stacking (futur)
trade_size: 0.5         # fracció del capital per compra

# ── Sub-bots participants (actualitzat Març 2026, backtest walk-forward) ─────
#
# DIAGNÒSTIC: de tots els bots testats, només 2 superen el tall mínim en TEST:
#
#   ml_rf_v1   TRAIN +153% Sharpe 1.13 | TEST +4.44% Sharpe 1.14 MaxDD -1.38%  ✅
#   ml_xgb_v1  TRAIN  +67% Sharpe 1.21 | TEST -3.53% Sharpe -0.42 MaxDD -7.51% ⚠️ borderline
#
# Descartats per overfit extrem (TRAIN 81k-275k% → TEST -8% a -55%):
#   gru, lgbm, catboost, patchtst
# Descartats per ser RL trencat o inactiu:
#   ppo_v1, sac_v1, ppo_professional, sac_professional, td3_multiframe
#   td3_professional (0 trades en TEST), td3_multiframe (overtrading)
# Descartats per negatiu en TEST 2025:
#   trend (-5.7%), mean_reversion (-13.2%), momentum (-8.8%), grid (-1.5%)
#
# Amb 2 sub-bots, majority_vote >50% = TOTS DOS han de coincidir (AND lògic).
# Resultat: senyal molt conservador, quasi zero falsos positius.
sub_bots:
  - config/models/random_forest.yaml   # TEST +4.44% Sharpe 1.14 ✅
  - config/models/xgboost.yaml         # TEST -3.53% borderline ⚠️ (inclòs per resolució)

  # ── Candidats futurs ──────────────────────────────────────────────────────
  # Afegir quan es reentreni amb més regularització i superin TEST > 0%:
  # - config/models/lightgbm.yaml      # TRAIN 124k% → TEST -55% — overfit
  # - config/models/catboost.yaml      # TRAIN 81k%  → TEST -42% — overfit
  # - config/models/gru.yaml           # TRAIN 114k% → TEST -8%  — overfit
  # - config/models/patchtst.yaml      # TRAIN 275k% → TEST -30% — overfit
  # - config/models/ppo_professional.yaml   # TEST -31%
  # - config/models/sac_professional.yaml   # TEST -16%
  # - config/models/td3_professional.yaml   # TEST 0 trades

# ── Notes ────────────────────────────────────────────────────────────────────
# - EnsembleBot gestiona el seu propi PaperExchange (cartera independent).
# - Els sub-bots corren en paral·lel com a bots independents a demo.yaml.
# - No afegis HoldBot: HOLD permanent distorsiona el vot.
# - Criteri per afegir un sub-bot: Return TEST > 0% i Sharpe TEST > 0.5.
