# config/models/ensemble.yaml
# ─────────────────────────────────────────────────────────────────────────────
# EnsembleBot — meta-bot que combina senyals de múltiples sub-bots
#
# Política v1 (demo): majority_vote
#   BUY  si > 50% sub-bots diuen BUY
#   SELL si > 50% sub-bots diuen SELL
#   HOLD en qualsevol altre cas
#
# Per afegir/treure sub-bots: edita la llista sub_bots i reinicia el DemoRunner.
# ─────────────────────────────────────────────────────────────────────────────
category: classic
model_type: ensemble
module: bots.classical.ensemble_bot
class_name: EnsembleBot

bot_id: ensemble_v1
policy: majority_vote   # majority_vote | weighted (futur) | stacking (futur)
trade_size: 0.5         # fracció del capital per compra

# ── Sub-bots participants ────────────────────────────────────────────────────
# ⚠️  PROBLEMA DETECTAT (backtest Març 2026):
#   Amb només 3 bots clàssics (trend, mean_reversion, momentum), l'ensemble
#   NO genera cap trade. Causa: TrendBot senyalitza <0.1% de les candles;
#   la probabilitat que 2/3 bots coincideixin en la mateixa candle és ~0.
#   SOLUCIÓ: afegir els models ML un cop retrenats amb precision_mean com a mètrica.
#   XGB i LGBM generen ~900 senyals per 52k candles (1.7%) → molt més viable.
#
# Ordre recomanat per habilitar sub-bots:
#   1. Clàssics que superin HoldBot en TEST (trend ✅, grid ✅ ja verificats)
#   2. ML retrenats amb metric: precision_mean (xgb, lgbm prioritaris)
#   3. RL professionals un cop validats
sub_bots:
  # Clàssics — senyals molt esparsos, vot de majoria quasi mai dispara sol
  - config/models/trend.yaml
  - config/models/mean_reversion.yaml
  - config/models/momentum.yaml

  # ML supervisat — HABILITAR UN COP RETRENATS amb metric: precision_mean
  # Prioritat: xgb i lgbm (generen prou senyals per fer funcionar la majoria)
  # - config/models/random_forest.yaml
  # - config/models/xgboost.yaml
  # - config/models/lightgbm.yaml
  # - config/models/catboost.yaml
  # - config/models/gru.yaml
  # - config/models/patchtst.yaml
  # - config/models/tft.yaml

  # RL — activar després de train_rl.py + backtest out-of-sample
  # - config/models/ppo_professional.yaml
  # - config/models/sac_professional.yaml
  # - config/models/td3_professional.yaml

# ── Notes ────────────────────────────────────────────────────────────────────
# - EnsembleBot gestiona el seu propi PaperExchange (cartera independent).
# - Els sub-bots també poden córrer en paral·lel com a bots independents
#   (demo.yaml) sense interferir amb l'ensemble.
# - No afegis HoldBot com a sub-bot: el seu HOLD permanent distorsiona el vot.
# - Criteris mínims per entrar a l'ensemble: Sharpe > 1.0, Drawdown < -25%
#   en backtest out-of-sample (TEST_FROM en endavant).
# - Mínim recomanat: 5 sub-bots actius per a majority_vote efectiu.
