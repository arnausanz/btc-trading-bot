# config/settings.yaml
app:
  name: btc-trading-bot
  env: development  # development | production

database:
  host: localhost
  port: 5432
  name: btc_trading
  user: btc_user
  password: btc_password

exchanges:
  default: paper
  binance:
    api_key: ""
    api_secret: ""
    testnet: true

data:
  default_symbol: BTC/USDT
  default_timeframes:
    - 1h
    - 4h
    - 1d
  historical_since: "2019-01-01"

backtesting:
  train_until: "2024-12-31"   # Últim dia del període d'entrenament (inclòs)
  test_from:   "2025-01-01"   # Primer dia del període de test (out-of-sample)

logging:
  level: INFO
  format: json