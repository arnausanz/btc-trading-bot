# config/optimization/ppo.yaml
base_config: config/training/ppo_experiment_1.yaml
model_type: ppo
n_trials: 15
metric: val_return_pct
direction: maximize
probe_timesteps: 20000

search_space:
  learning_rate:
    type: float
    low: 0.0001
    high: 0.001
    log: true
  n_steps:
    type: categorical
    choices: [512, 1024, 2048]
  batch_size:
    type: categorical
    choices: [32, 64, 128]
  gamma:
    type: float
    low: 0.95
    high: 0.999
  reward_type:
    type: categorical
    choices: [simple, sharpe, sortino]
  lookback:
    type: categorical
    choices: [30, 50, 96]