# config/demo.yaml
# Bots actius en el Demo Runner.
# Posa enabled: false per desactivar un bot sense eliminar-lo.
# El DemoRunner detecta automàticament el tipus (classic/ML/RL) pel camp
# category del YAML unificat.

demo:
  symbol: BTC/USDT
  timeframe: 1h
  update_interval_seconds: 60   # monitoratge cada minut
  # on_observation() es crida 1 cop/hora quan es tanca la candle (candle sync)

bots:
  # Classics
  - config_path: config/models/hold.yaml
    enabled: true
  - config_path: config/models/trend.yaml
    enabled: true
  - config_path: config/models/dca.yaml
    enabled: true
  - config_path: config/models/grid.yaml
    enabled: false

  - config_path: config/models/mean_reversion.yaml
    enabled: false   # activar després de fer backtest i superar HoldBot
  - config_path: config/models/momentum.yaml
    enabled: false   # activar després de fer backtest i superar HoldBot

  # ML supervisat
  - config_path: config/models/random_forest.yaml
    enabled: true
  - config_path: config/models/xgboost.yaml
    enabled: true
  - config_path: config/models/lightgbm.yaml
    enabled: true
  - config_path: config/models/catboost.yaml
    enabled: true
  - config_path: config/models/gru.yaml
    enabled: true
  - config_path: config/models/patchtst.yaml
    enabled: true

  # RL - activar despres d'executar train_rl.py
  - config_path: config/models/ppo.yaml
    enabled: false
  - config_path: config/models/sac.yaml
    enabled: false
  # RL on-chain - requereix dades externes a la BD + entrenament explícit
  # python scripts/train_rl.py --agents ppo_onchain sac_onchain
  - config_path: config/models/ppo_onchain.yaml
    enabled: false
  - config_path: config/models/sac_onchain.yaml
    enabled: false

  # Ensemble — activar un cop tots els sub-bots hagin passat el backtest out-of-sample
  - config_path: config/models/ensemble.yaml
    enabled: false   # activar desprès de validació C (Sharpe > 1.0, Drawdown < -25%)

exchange:
  config_path: config/exchanges/paper.yaml

telegram:
  enabled: true

logging:
  level: INFO
