# config/demo.yaml
# Bots actius en el Demo Runner.
# Posa enabled: false per desactivar un bot sense eliminar-lo.
#
# Estat post-backtest walk-forward (Març 2026)
# ─────────────────────────────────────────────────────────────────────────────
# ACTIUS (superen o estan a prop del tall):
#   hold_v1        → benchmark pur (seguiment BTC spot sense estratègia)
#   ml_rf_v1       → únic bot amb TEST positiu (+4.44% Sharpe 1.14)  ✅
#   ml_xgb_v1      → borderline TEST -3.53%, inclòs per observació   ⚠️
#   ensemble_v1    → AND(rf, xgb) — senyal molt conservador           ✅
#
# DESACTIVATS:
#   Clàssics       → tots negatius en TEST 2025 (BTC lateral/baixista)
#   GRU/LGBM/CB/PTST → overfit extrem (TRAIN 80k–275k% → TEST -8...-55%)
#   RL baseline    → broken (PPO -77%, SAC -95% en test)
#   RL professional → negatiu en test (PPO -31%, SAC -16%)
#   RL TD3         → professional inactiu (0 trades test), multiframe overtrading
#   Gate           → pendent d'entrenar (train_gate_regime.py)
# ─────────────────────────────────────────────────────────────────────────────

demo:
  symbol: BTC/USDT
  timeframe: 1h
  update_interval_seconds: 300          # poll cada 5 min (comprovació de candle nova)
  data_update_interval_seconds: 1800   # actualitza BD cada 30 min (2 checks per candle 1h)
  # on_observation() es crida 1 cop/hora quan es tanca la candle (candle sync)

bots:
  # ── Benchmark ───────────────────────────────────────────────────────────────
  - config_path: config/models/hold.yaml
    enabled: true    # benchmark pur — mostra com va BTC sense estratègia

  # ── Clàssics ────────────────────────────────────────────────────────────────
  - config_path: config/models/trend.yaml
    enabled: false   # TEST -5.68% — negatiu en mercat 2025
  - config_path: config/models/dca.yaml
    enabled: false   # TEST -22.58% — segueix BTC a la baixa
  - config_path: config/models/grid.yaml
    enabled: false   # TEST -1.45%
  - config_path: config/models/mean_reversion.yaml
    enabled: false   # TEST -13.20%
  - config_path: config/models/momentum.yaml
    enabled: false   # TEST -8.80%

  # ── ML supervisat ───────────────────────────────────────────────────────────
  - config_path: config/models/random_forest.yaml
    enabled: true    # TEST +4.44% Sharpe 1.14 — l'únic bot clarament bo  ✅

  - config_path: config/models/xgboost.yaml
    enabled: true    # TEST -3.53% borderline — inclòs per observació      ⚠️

  - config_path: config/models/lightgbm.yaml
    enabled: false   # overfit extrem: TRAIN 124k% → TEST -55%

  - config_path: config/models/catboost.yaml
    enabled: false   # overfit extrem: TRAIN 81k% → TEST -42%

  - config_path: config/models/gru.yaml
    enabled: false   # overfit extrem: TRAIN 114k% → TEST -8%

  - config_path: config/models/patchtst.yaml
    enabled: false   # overfit extrem: TRAIN 275k% → TEST -30%

  - config_path: config/models/tft.yaml
    enabled: false   # no entrenat (0 trades en backtest)

  # ── RL baseline ─────────────────────────────────────────────────────────────
  - config_path: config/models/ppo.yaml
    enabled: false   # broken: TEST -76.62%

  - config_path: config/models/sac.yaml
    enabled: false   # broken: TEST -95.24% (quasi en fallida)

  # ── RL on-chain ─────────────────────────────────────────────────────────────
  - config_path: config/models/ppo_onchain.yaml
    enabled: false   # comparable: false — manca historial on-chain

  - config_path: config/models/sac_onchain.yaml
    enabled: false   # comparable: false — manca historial on-chain

  # ── RL professional ─────────────────────────────────────────────────────────
  - config_path: config/models/ppo_professional.yaml
    enabled: false   # TEST -31.67% Sharpe -2.35

  - config_path: config/models/sac_professional.yaml
    enabled: false   # TEST -16.26% Sharpe -3.57

  # ── RL TD3 ──────────────────────────────────────────────────────────────────
  - config_path: config/models/td3_professional.yaml
    enabled: false   # TEST 0 trades (inactiu) — no perd però tampoc aporta

  - config_path: config/models/td3_multiframe.yaml
    enabled: false   # overtrading (32k BUY en training) + TEST negatiu

  # ── Gate System ─────────────────────────────────────────────────────────────
  - config_path: config/models/gate.yaml
    enabled: true    # models entrenats: gate_hmm.pkl + gate_xgb_regime.pkl ✅

  # ── Ensemble ────────────────────────────────────────────────────────────────
  - config_path: config/models/ensemble.yaml
    enabled: true    # AND(rf_v1, xgb_v1) — senyal molt conservador  ✅

exchange:
  config_path: config/exchanges/paper.yaml

telegram:
  enabled: true
  inactivity_hours: 4          # Alerta push si un bot porta X hores sense trades
  drawdown_alert_pct: -10      # Alerta push si max drawdown supera aquest llindar (%)
  data_stale_minutes: 60       # Alerta push si OHLCV no s'actualitza en X minuts (2x data_update_interval)

logging:
  level: INFO
