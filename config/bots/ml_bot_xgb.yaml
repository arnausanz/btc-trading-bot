# config/bots/ml_bot.yaml
bot_id: ml_xgb_v1
symbol: BTC/USDT
timeframe: 1h
lookback: 200
features:
  - close
  - rsi_14
  - macd
  - macd_signal
  - macd_hist
  - atr_14
  - bb_upper_20
  - bb_lower_20
  - bb_middle_20

model_path: models/xgboost_v1.pkl
model_type: xgboost

# Només actua si la confiança del model supera aquest llindar
min_confidence: 0.4
trade_size: 0.5
prediction_threshold: 0.35