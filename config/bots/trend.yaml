# config/bots/trend.yaml
bot_id: trend_v1
symbol: BTC/USDT
timeframe: 1h
lookback: 200
features:
  - close
  - ema_20
  - ema_50
  - rsi_14

ema_fast: 20
ema_slow: 50
rsi_overbought: 70    # no compra si RSI > 70
rsi_oversold: 30      # no ven si RSI < 30
trade_size: 0.5       # 50% del capital per operació