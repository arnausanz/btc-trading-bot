# config/bots/rl_bot_ppo_onchain.yaml
# PPO bot trained with on-chain + sentiment features.
# Deployment counterpart of config/training/ppo_onchain_v1.yaml
#
# obs_shape = len(features) × lookback = 14 × 96 = 1344
bot_id: rl_ppo_onchain_v1
symbol: BTC/USDT
timeframe: 1h
lookback: 96             # MUST match environment.lookback in ppo_onchain_v1.yaml
model_type: ppo
model_path: models/ppo_onchain_v1
trade_size: 0.5

# ── Feature list ───────────────────────────────────────────────────────────────
# MUST match data.features.select in ppo_onchain_v1.yaml
features:
  - close
  - rsi_14
  - macd
  - macd_signal
  - macd_hist
  - atr_14
  - bb_upper_20
  - bb_lower_20
  - bb_middle_20
  - fear_greed_value
  - fear_greed_class
  - funding_rate
  - oi_btc_1h
  - hash_rate

# ── External data sources ──────────────────────────────────────────────────────
# MUST match data.features.external in ppo_onchain_v1.yaml
# ObservationBuilder reads this to load the correct data at inference time.
external:
  fear_greed: true
  funding_rate: true
  funding_rate_symbol: BTC/USDT:USDT
  open_interest:
    - symbol: BTC/USDT:USDT
      timeframe: 1h
  blockchain:
    - hash-rate
