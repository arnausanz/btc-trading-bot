# config/bots/rl_bot_sac.yaml
bot_id: rl_sac_v1
symbol: BTC/USDT
timeframe: 1h
lookback: 96             # MUST match environment.lookback in sac_optimized.yaml
model_type: sac
model_path: models/sac_btc_v1
trade_size: 0.5

# ── Feature list ───────────────────────────────────────────────────────────────
# MUST match data.features.select in sac_optimized.yaml (the training config used)
# obs_shape = len(features) × lookback = 9 × 96 = 864
features:
  - close
  - rsi_14
  - macd
  - macd_signal
  - macd_hist
  - atr_14
  - bb_upper_20
  - bb_lower_20
  - bb_middle_20

# ── External data sources ──────────────────────────────────────────────────────
# MUST match data.features.external in the training config.
# ObservationBuilder uses this to load the same data as training.
external: {}   # no external features in this baseline bot
