# config/optimization/lightgbm.yaml
base_config: config/training/lgbm_experiment_1.yaml
model_type: lightgbm
n_trials: 30
metric: accuracy_mean
direction: maximize

search_space:
  n_estimators:
    type: int
    low: 100
    high: 500
  max_depth:
    type: int
    low: 3
    high: 10
  learning_rate:
    type: float
    low: 0.01
    high: 0.3
    log: true
  num_leaves:
    type: int
    low: 15
    high: 63
  scale_pos_weight:
    type: float
    low: 1.0
    high: 5.0