# config/optimization/gru.yaml
base_config: config/training/gru_experiment_1.yaml
model_type: gru
n_trials: 15
metric: accuracy_mean
direction: maximize

search_space:
  seq_len:
    type: categorical
    choices: [48, 72, 96]
  hidden_size:
    type: categorical
    choices: [64, 128]
  dropout:
    type: float
    low: 0.1
    high: 0.5
  learning_rate:
    type: float
    low: 0.0001
    high: 0.01
    log: true
  batch_size:
    type: categorical
    choices: [32, 64, 128]