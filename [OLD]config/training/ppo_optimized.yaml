data:
  symbol: BTC/USDT
  timeframe: 1h
  train_pct: 0.8

  # ── Feature config ──────────────────────────────────────────────────────────
  # features.select MUST match config/bots/rl_bot_ppo.yaml features list
  # obs_shape = len(select) × environment.lookback = 9 × 96 = 864
  features:
    external: {}
    select:
      - close
      - rsi_14
      - macd
      - macd_signal
      - macd_hist
      - atr_14
      - bb_upper_20
      - bb_lower_20
      - bb_middle_20

environment:
  fee_rate: 0.001
  initial_capital: 10000.0
  lookback: 96           # MUST match config/bots/rl_bot_ppo.yaml lookback
  reward_scaling: 100.0
  reward_type: sharpe
experiment_name: ppo_optimized
model:
  batch_size: 128
  gamma: 0.9674809130079859
  learning_rate: 0.00012260057359187533
  n_epochs: 10
  n_steps: 2048
  policy: MlpPolicy
  total_timesteps: 500000
model_type: ppo
output:
  model_path: models/ppo_btc_v1
