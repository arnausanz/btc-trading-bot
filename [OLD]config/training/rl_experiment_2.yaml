# config/training/rl_experiment_1.yaml
experiment_name: dqn_v2
model_type: dqn

data:
  symbol: BTC/USDT
  timeframe: 1h
  train_pct: 0.8

environment:
  lookback: 50
  initial_capital: 10000.0
  fee_rate: 0.001
  reward_scaling: 100.0
  reward_type: sharpe

model:
  total_timesteps: 100000
  learning_rate: 0.0001
  batch_size: 64
  policy: MlpPolicy

output:
  model_path: models/dqn_v2